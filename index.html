<script>
// ============================================================
// 常量定义
// ============================================================
const STORAGE_KEY = 'pomodoro-kanban-tasks';

const COLORS = [
  { value: '#EF4444', label: '红' },
  { value: '#F97316', label: '橙' },
  { value: '#EAB308', label: '黄' },
  { value: '#22C55E', label: '绿' },
  { value: '#06B6D4', label: '青' },
  { value: '#3B82F6', label: '蓝' },
  { value: '#8B5CF6', label: '紫' },
  { value: '#9CA3AF', label: '灰' }
];
const DEFAULT_COLOR = '#9CA3AF';

const QUADRANT_COLORS = {
  q1: '#EF4444',  // 重要且紧急 — 红
  q2: '#3B82F6',  // 重要不紧急 — 蓝
  q3: '#F97316',  // 不重要但紧急 — 橙
  q4: '#22C55E',  // 不重要不紧急 — 绿
};

function getQuadrantColor(quadrant) {
  return QUADRANT_COLORS[quadrant] || DEFAULT_COLOR;
}

const COLUMNS = [
  { key: 'todo',       label: '待办' },
  { key: 'doing',      label: '进行中' },
  { key: 'completed',  label: '已完成' }
];

const FOCUS_SECONDS = 25 * 60;   // 25 分钟
const BREAK_SECONDS = 5 * 60;    // 5 分钟
const LONG_PRESS_MS = 300;       // 长按触发时间
const DEBOUNCE_MS = 200;         // localStorage 写入防抖
let _purgeIntervalId = null;
const TOUCH_MOVE_THRESHOLD = 10; // 触控移动阈值（超过此值取消长按）

// ============================================================
// API 客户端 (ApiClient)
// 封装 fetch 请求，自动附加 JWT 认证头部
// ============================================================
const ApiClient = (() => {
  const BASE = '';  // 同源部署
  let _token = null;

  function setToken(t) { _token = t; }
  function clearToken() { _token = null; }
  function getToken() { return _token; }

  async function request(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (_token) headers['Authorization'] = `Bearer ${_token}`;

    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);

    const res = await fetch(BASE + path, opts);
    const data = await res.json();

    if (!res.ok) {
      // Token 过期或无效 → 触发登出
      if (res.status === 401) {
        clearToken();
        localStorage.removeItem('kanban-token');
        if (typeof AuthUI !== 'undefined') AuthUI.onTokenExpired();
      }
      throw new Error(data.error || '请求失败');
    }
    return data;
  }

  return {
    setToken, clearToken, getToken,
    get:    (path)            => request('GET', path),
    post:   (path, body)      => request('POST', path, body),
    put:    (path, body)      => request('PUT', path, body),
    del:    (path)            => request('DELETE', path),
  };
})();

// ============================================================
// 认证 UI 模块 (AuthUI)
// 登录/注册模态框、Token 管理、用户状态显示
// ============================================================
const AuthUI = (() => {
  const TOKEN_KEY = 'kanban-token';
  let _user = null;     // { id, username } | null
  let _isLoginMode = true;

  /** 初始化：检查已有 token 是否有效 */
  async function init() {
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) {
      updateStatusBar();
      return false;
    }

    ApiClient.setToken(token);
    try {
      const data = await ApiClient.get('/api/auth/me');
      _user = data.user;
      updateStatusBar();
      return true;
    } catch (_e) {
      // Token 无效，清除
      localStorage.removeItem(TOKEN_KEY);
      ApiClient.clearToken();
      updateStatusBar();
      return false;
    }
  }

  function isLoggedIn() { return _user !== null; }
  function getUser() { return _user; }

  /** 显示登录/注册模态框 */
  function show() {
    _isLoginMode = true;
    document.getElementById('authModalTitle').textContent = '登录';
    document.getElementById('authSubmitBtn').textContent = '登录';
    document.getElementById('authToggleMode').textContent = '没有账号？去注册';
    document.getElementById('authUsername').value = '';
    document.getElementById('authPassword').value = '';
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authModalBackdrop').classList.add('open');
    document.getElementById('authUsername').focus();
  }

  function hide() {
    document.getElementById('authModalBackdrop').classList.remove('open');
  }

  /** 提交登录/注册 */
  async function submit() {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    const errorEl = document.getElementById('authError');

    if (!username || !password) {
      errorEl.textContent = '用户名和密码不能为空';
      errorEl.style.display = '';
      return;
    }
    if (password.length < 6) {
      errorEl.textContent = '密码至少需要 6 个字符';
      errorEl.style.display = '';
      return;
    }

    const path = _isLoginMode ? '/api/auth/login' : '/api/auth/register';
    try {
      const data = await ApiClient.post(path, { username, password });
      ApiClient.setToken(data.token);
      localStorage.setItem(TOKEN_KEY, data.token);
      _user = data.user;
      updateStatusBar();
      hide();

      // 触发登录后回调（数据迁移与同步初始化）
      if (typeof onLoginSuccess === 'function') onLoginSuccess();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = '';
    }
  }

  /** 登出 */
  function logout() {
    _user = null;
    localStorage.removeItem(TOKEN_KEY);
    ApiClient.clearToken();
    updateStatusBar();
    // 登出后触发回调
    if (typeof onLogout === 'function') onLogout();
  }

  /** Token 过期处理 */
  function onTokenExpired() {
    _user = null;
    updateStatusBar();
    if (typeof onLogout === 'function') onLogout();
  }

  /** 切换登录/注册模式 */
  function toggleMode() {
    _isLoginMode = !_isLoginMode;
    document.getElementById('authModalTitle').textContent = _isLoginMode ? '登录' : '注册';
    document.getElementById('authSubmitBtn').textContent = _isLoginMode ? '登录' : '注册';
    document.getElementById('authToggleMode').textContent = _isLoginMode ? '没有账号？去注册' : '已有账号？去登录';
    document.getElementById('authError').style.display = 'none';
  }

  function updateStatusBar() {
    const bar = document.getElementById('userStatusBar');
    const nameEl = document.getElementById('userStatusName');
    const loginBtn = document.getElementById('headerLoginBtn');
    if (_user) {
      nameEl.textContent = _user.username;
      bar.style.display = 'flex';
      if (loginBtn) loginBtn.style.display = 'none';
    } else {
      bar.style.display = 'none';
      if (loginBtn) loginBtn.style.display = '';
    }
  }

  /** 绑定事件 */
  function setupEvents() {
    document.getElementById('authForm').addEventListener('submit', (e) => {
      e.preventDefault();
      submit();
    });
    document.getElementById('authCancelBtn').addEventListener('click', hide);
    document.getElementById('authToggleMode').addEventListener('click', toggleMode);
    document.getElementById('userLogoutBtn').addEventListener('click', logout);
    document.getElementById('headerLoginBtn').addEventListener('click', show);
  }

  return { init, isLoggedIn, getUser, show, hide, logout, onTokenExpired, setupEvents };
})();

// ============================================================
// 数据迁移模块 (MigrationUI)
// 登录后将 localStorage 旧数据导入到服务器账号
// ============================================================
const MigrationUI = (() => {
  let _tasks = [];

  function show(localTasks) {
    _tasks = localTasks;
    document.getElementById('migrationCount').textContent = localTasks.length;
    document.getElementById('migrationError').style.display = 'none';
    document.getElementById('migrationModalBackdrop').classList.add('open');
  }

  function hide() {
    document.getElementById('migrationModalBackdrop').classList.remove('open');
  }

  async function doImport() {
    const importBtn = document.getElementById('migrationImportBtn');
    importBtn.disabled = true;
    importBtn.textContent = '导入中...';

    try {
      await ApiClient.post('/api/tasks/import', { tasks: _tasks });
      localStorage.removeItem(STORAGE_KEY);
      hide();
      // 重新加载服务器数据并渲染
      await Store.loadFromServer();
      Kanban.renderAll();
    } catch (err) {
      document.getElementById('migrationError').textContent = err.message;
      document.getElementById('migrationError').style.display = '';
    } finally {
      importBtn.disabled = false;
      importBtn.textContent = '导入';
    }
  }

  function skip() {
    hide();
    // 跳过迁移，保留本地数据不动
  }

  function setupEvents() {
    document.getElementById('migrationImportBtn').addEventListener('click', doImport);
    document.getElementById('migrationSkipBtn').addEventListener('click', skip);
  }

  return { show, hide, doImport, skip, setupEvents };
})();

// ============================================================
// 数据存储模块 (Store)
// 负责 localStorage 读写与内存中任务数组的管理
// ============================================================
const Store = (() => {
  let _tasks = [];
  let _debounceTimer = null;
  let _useServer = false;

  /** 是否处于服务器模式 */
  function isServerMode() { return _useServer; }

  /** 显式启用服务器模式（由 Sync 模块在建立 SSE 连接后调用） */
  function useServerMode() { _useServer = true; }

  /** 初始化：从 localStorage 加载任务数据（未登录模式） */
  function initLocal() {
    _useServer = false;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      _tasks = raw ? JSON.parse(raw) : [];
    } catch (_e) {
      _tasks = [];
    }
    // 确保所有任务都有必要的字段
    _tasks = _tasks.map(normalizeTask);
    return _tasks;
  }

  /** 切换到服务器模式并从服务器加载任务 */
  async function loadFromServer() {
    try {
      const data = await ApiClient.get('/api/tasks');
      _tasks = (data.tasks || []).map(t => normalizeTask({
        ...t,
        order: t.order  // API 已返回 order 字段
      }));
      _useServer = true;
      return _tasks;
    } catch (_err) {
      console.error('从服务器加载任务失败:', _err);
      _useServer = false;
      return _tasks;
    }
  }

  /** 容错：为缺少字段的旧数据补充默认值 */
  function normalizeTask(t) {
    return {
      id:          t.id          || crypto.randomUUID(),
      title:       t.title       || '未命名任务',
      description: t.description || '',
      color:       t.color       || DEFAULT_COLOR,
      column:      t.column      || 'todo',
      order:       typeof t.order === 'number' ? t.order : 0,
      createdAt:   t.createdAt   || new Date().toISOString(),
      completedAt: t.completedAt || null,
      quadrant:    t.quadrant    || null   // 'q1'|'q2'|'q3'|'q4'|null
    };
  }

  /** 获取全部任务 */
  function getAll() { return _tasks; }

  /** 获取指定列的任务（按 order 排序） */
  function getByColumn(col) {
    return _tasks
      .filter(t => t.column === col)
      .sort((a, b) => a.order - b.order);
  }

  /** 获取指定 ID 的任务 */
  function getById(id) { return _tasks.find(t => t.id === id) || null; }

  /** 获取非「已完成」列的任务 */
  function getActiveTasks() {
    return _tasks.filter(t => t.column !== 'completed');
  }

  /** 添加任务 */
  async function add(task) {
    if (_useServer) {
      const data = await ApiClient.post('/api/tasks', task);
      _tasks.push(normalizeTask(data.task));
      return;
    }
    // 原有的 localStorage add 逻辑
    const colTasks = getByColumn(task.column);
    task.order = colTasks.length > 0
      ? Math.max(...colTasks.map(t => t.order)) + 1
      : 0;
    const normalized = normalizeTask(task);
    // Stamp completedAt for tasks created directly in the completed column
    if (normalized.column === 'completed' && !normalized.completedAt) {
      normalized.completedAt = new Date().toISOString();
    }
    _tasks.push(normalized);
    scheduleSave();
  }

  /** 更新任务字段 */
  async function update(taskId, updates) {
    if (_useServer) {
      await ApiClient.put(`/api/tasks/${taskId}`, updates);
      // SSE 会推送更新，这里乐观更新
      const task = getById(taskId);
      if (task) Object.assign(task, updates);
      return;
    }
    // 原有的 localStorage update 逻辑
    const task = getById(taskId);
    if (!task) return;
    Object.assign(task, updates);
    scheduleSave();
  }

  /** 删除任务 */
  async function remove(taskId) {
    if (_useServer) {
      await ApiClient.del(`/api/tasks/${taskId}`);
      _tasks = _tasks.filter(t => t.id !== taskId);
      return;
    }
    // 原有的 localStorage remove 逻辑
    _tasks = _tasks.filter(t => t.id !== taskId);
    scheduleSave();
  }

  /**
   * 移动任务到目标列的指定位置
   * @param {string} taskId  任务 ID
   * @param {string} targetCol 目标列 key
   * @param {number} targetIndex 目标列中的插入位置
   */
  async function move(taskId, targetCol, targetIndex) {
    if (_useServer) {
      await ApiClient.put(`/api/tasks/${taskId}/move`, { column: targetCol, sort_order: targetIndex });
      // SSE 会推送更新，这里乐观更新
      const task = getById(taskId);
      if (!task) return;
      task.column = targetCol;
      if (targetCol === 'completed' && !task.completedAt) {
        task.completedAt = new Date().toISOString();
      } else if (targetCol !== 'completed') {
        task.completedAt = null;
      }
      return;
    }
    // 原有的 localStorage move 逻辑（保持不变）
    const task = getById(taskId);
    if (!task) return;
    const sourceCol = task.column;

    // 更改所属列
    task.column = targetCol;

    // Stamp completedAt when moving to completed, clear when moving out
    if (targetCol === 'completed' && sourceCol !== 'completed') {
      task.completedAt = new Date().toISOString();
    } else if (targetCol !== 'completed') {
      task.completedAt = null;
    }

    // 获取目标列的任务列表（排除当前任务）
    let targetTasks = _tasks
      .filter(t => t.column === targetCol && t.id !== taskId)
      .sort((a, b) => a.order - b.order);

    // 在目标位置插入
    targetTasks.splice(targetIndex, 0, task);

    // 重新分配目标列所有任务的 order
    targetTasks.forEach((t, i) => { t.order = i; });

    // 如果移动到不同列，重新分配源列 order
    if (sourceCol !== targetCol) {
      const sourceTasks = _tasks
        .filter(t => t.column === sourceCol)
        .sort((a, b) => a.order - b.order);
      sourceTasks.forEach((t, i) => { t.order = i; });
    }

    scheduleSave();
  }

  /** 防抖写入 localStorage（服务器模式下跳过） */
  function scheduleSave() {
    if (_useServer) return; // 服务器模式通过 API 即时保存
    clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(() => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(_tasks));
    }, DEBOUNCE_MS);
  }

  /** 立即写入 localStorage（用于页面关闭前） */
  function flushSave() {
    if (_useServer) return;
    clearTimeout(_debounceTimer);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(_tasks));
  }

  /** 删除 7 天前完成的任务，返回被删除的数量 */
  function purgeExpired() {
    const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
    const before = _tasks.length;
    _tasks = _tasks.filter(t => {
      if (t.column !== 'completed') return true;
      if (!t.completedAt) return true;
      return new Date(t.completedAt).getTime() > cutoff;
    });
    const removed = before - _tasks.length;
    if (removed > 0) scheduleSave();
    return removed;
  }

  /** 应用服务器推送的变更事件（SSE） */
  function applyServerEvent(event) {
    if (!_useServer) return;
    const { action, task } = event;

    switch (action) {
      case 'create':
        if (!_tasks.find(t => t.id === task.id)) {
          _tasks.push(normalizeTask(task));
        }
        break;
      case 'update':
      case 'move': {
        const idx = _tasks.findIndex(t => t.id === task.id);
        if (idx !== -1) {
          _tasks[idx] = normalizeTask(task);
        } else {
          _tasks.push(normalizeTask(task));
        }
        break;
      }
      case 'delete':
        _tasks = _tasks.filter(t => t.id !== task.id);
        break;
    }
    // 触发重新渲染（由调用方负责）
  }

  return {
    init: initLocal, useServerMode, loadFromServer, isServerMode, applyServerEvent,
    getAll, getByColumn, getById, getActiveTasks,
    add, update, remove, move,
    flushSave, purgeExpired
  };
})();

// ============================================================
// 实时同步模块 (Sync)
// 通过 SSE 接收服务器推送的任务变更
// ============================================================
const Sync = (() => {
  let _eventSource = null;

  function connect() {
    if (!AuthUI.isLoggedIn()) return;

    const token = ApiClient.getToken();
    if (!token) return;

    disconnect(); // 确保没有重复连接

    _eventSource = new EventSource(`/api/sse/events?token=${encodeURIComponent(token)}`);

    _eventSource.addEventListener('message', (e) => {
      try {
        const event = JSON.parse(e.data);
        if (event.type === 'connected') return;

        if (event.type === 'task-change') {
          Store.applyServerEvent(event);
          Kanban.renderAll();
          if (typeof renderTimerTaskList === 'function') renderTimerTaskList();
        }
      } catch (_err) {
        // 忽略解析错误
      }
    });

    _eventSource.addEventListener('error', () => {
      // EventSource 会自动重连，重连成功后全量拉取
      setTimeout(async () => {
        if (_eventSource && _eventSource.readyState === EventSource.OPEN) {
          await Store.loadFromServer();
          Kanban.renderAll();
        }
      }, 2000);
    });
  }

  function disconnect() {
    if (_eventSource) {
      _eventSource.close();
      _eventSource = null;
    }
  }

  return { connect, disconnect };
})();

// ============================================================
// 音频模块 (Beeper)
// 使用 Web Audio API 生成提示音
// ============================================================
const Beeper = (() => {
  let _ctx = null;

  /** 获取或创建 AudioContext */
  function getCtx() {
    if (!_ctx) {
      _ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return _ctx;
  }

  /** 播放一个 beep 音 */
  function beep(frequency, duration, type) {
    try {
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type || 'sine';
      osc.frequency.value = frequency;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch (_e) { /* 静默处理音频错误 */ }
  }

  /** 专注完成提示音（三声渐高） */
  function focusComplete() {
    setTimeout(() => beep(523, 0.15, 'sine'), 0);
    setTimeout(() => beep(659, 0.15, 'sine'), 150);
    setTimeout(() => beep(784, 0.3,  'sine'), 300);
  }

  /** 休息完成提示音（两声） */
  function breakComplete() {
    setTimeout(() => beep(784, 0.2, 'sine'), 0);
    setTimeout(() => beep(523, 0.35, 'sine'), 250);
  }

  /** 恢复 AudioContext（用户手势后调用） */
  function resume() {
    try {
      const ctx = getCtx();
      if (ctx.state === 'suspended') { ctx.resume(); }
    } catch (_e) { /* 静默处理 */ }
  }

  return { beep, focusComplete, breakComplete, resume };
})();

// ============================================================
// 番茄计时器模块 (Timer)
// 状态机：idle -> focus -> break -> idle
// ============================================================
const Timer = (() => {
  let _state = 'idle';      // 'idle' | 'focus' | 'break'
  let _seconds = FOCUS_SECONDS;
  let _taskId = null;
  let _intervalId = null;
  let _isPaused = false;

  /** 获取当前状态 */
  function getState() { return _state; }

  /** 获取当前秒数 */
  function getSeconds() { return _seconds; }

  /** 获取焦点任务 ID */
  function getTaskId() { return _taskId; }

  /** 判断任务是否被锁定 */
  function isTaskLocked(id) { return _state !== 'idle' && _taskId === id; }

  /** 是否有活跃会话 */
  function isActive() { return _state !== 'idle'; }

  /** 开始专注 */
  function start(taskId) {
    if (_state !== 'idle') return;
    const task = Store.getById(taskId);
    if (!task) {
      // 任务已被删除，重置引用
      _taskId = null;
      updateUI();
      return;
    }
    Beeper.resume(); // 用户手势触发 AudioContext 恢复
    _taskId = taskId;
    _state = 'focus';
    _seconds = FOCUS_SECONDS;
    _isPaused = false;
    _startInterval();
    updateUI();
  }

  /** 暂停 / 恢复 */
  function togglePause() {
    if (_state === 'idle') return;
    _isPaused = !_isPaused;
    if (_isPaused) {
      clearInterval(_intervalId);
      _intervalId = null;
    } else {
      _startInterval();
    }
    updateUI();
  }

  /** 放弃当前会话 */
  function abandon() {
    clearInterval(_intervalId);
    _intervalId = null;
    _taskId = null;
    _state = 'idle';
    _seconds = FOCUS_SECONDS;
    _isPaused = false;
    updateUI();
    document.title = '番茄看板';
  }

  /** 启动倒计时 */
  function _startInterval() {
    if (_intervalId) clearInterval(_intervalId);
    _intervalId = setInterval(() => {
      _seconds--;
      if (_seconds > 0) {
        updateUI();
      } else {
        clearInterval(_intervalId);
        _intervalId = null;
        _onComplete();
      }
    }, 1000);
  }

  /** 当前阶段完成 */
  function _onComplete() {
    Beeper.resume(); // 确保 AudioContext 处于运行状态（非用户手势触发时可能被暂停）
    if (_state === 'focus') {
      // 专注完成 → 提示音 → 自动进入休息
      Beeper.focusComplete();
      _state = 'break';
      _seconds = BREAK_SECONDS;
      _isPaused = false;
      _startInterval();
      updateUI();
    } else if (_state === 'break') {
      // 休息完成 → 提示音 → 重置
      Beeper.breakComplete();
      _taskId = null;
      _state = 'idle';
      _seconds = FOCUS_SECONDS;
      _isPaused = false;
      updateUI();
      document.title = '番茄看板';
    }
  }

  /** 更新所有计时器相关 UI（仅做增量 DOM 更新，不重绘看板） */
  function updateUI() {
    _updatePanelUI();
    _updateToggleBtn();
    _updateTabTitle();
    _updateTaskFocusBadge();
  }

  /** 更新计时器面板内部 UI */
  function _updatePanelUI() {
    const timeDisplay = document.getElementById('timerTimeDisplay');
    const modeLabel = document.getElementById('timerModeLabel');
    const startBtn = document.getElementById('timerStartBtn');
    const pauseBtn = document.getElementById('timerPauseBtn');
    const abandonBtn = document.getElementById('timerAbandonBtn');
    const taskListEl = document.getElementById('timerTaskList');

    const min = Math.floor(_seconds / 60);
    const sec = _seconds % 60;
    const timeStr = String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    timeDisplay.textContent = timeStr;
    timeDisplay.classList.toggle('break-mode', _state === 'break');

    // 按钮状态
    if (_state === 'idle') {
      modeLabel.textContent = '选择任务开始专注';
      startBtn.disabled = !_taskId;
      startBtn.textContent = '开始专注';
      startBtn.style.display = '';
      pauseBtn.disabled = true;
      pauseBtn.textContent = '暂停';
      pauseBtn.style.display = '';
      abandonBtn.disabled = true;
      _enableTimerTaskList();
    } else if (_state === 'focus' || _state === 'break') {
      modeLabel.textContent = _state === 'focus' ? '🔴 专注中' : '🟢 休息中';
      startBtn.style.display = 'none';
      pauseBtn.disabled = false;
      pauseBtn.textContent = _isPaused ? '继续' : '暂停';
      abandonBtn.disabled = false;
      _disableTimerTaskList();
    }

    // 更新任务列表选中态
    renderTimerTaskList();
  }

  /** 更新浮动按钮 UI */
  function _updateToggleBtn() {
    const btn = document.getElementById('timerToggleBtn');
    const iconEl = btn.querySelector('.toggle-icon');
    const timeEl = btn.querySelector('.toggle-time');

    if (_state !== 'idle') {
      // 计时中：按钮显示剩余时间
      const min = Math.floor(_seconds / 60);
      const sec = _seconds % 60;
      const timeStr = String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
      btn.classList.add('timer-running');
      iconEl.style.display = 'none';
      timeEl.style.display = '';
      timeEl.textContent = (_state === 'focus' ? '🍅 ' : '☕ ') + timeStr;
    } else {
      // 无计时：显示图标
      btn.classList.remove('timer-running');
      iconEl.style.display = '';
      iconEl.textContent = '🍅';
      timeEl.style.display = 'none';
    }
  }

  /** 更新标签页标题 */
  function _updateTabTitle() {
    if (_state === 'idle') {
      document.title = '番茄看板';
    } else {
      const min = Math.floor(_seconds / 60);
      const sec = _seconds % 60;
      const timeStr = String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
      const label = _state === 'focus' ? '专注' : '休息';
      document.title = timeStr + ' - ' + label + ' - 番茄看板';
    }
  }

  /** 更新任务卡片上的「聚焦中」标识 */
  function _updateTaskFocusBadge() {
    document.querySelectorAll('.task-card').forEach(card => {
      const cardId = card.dataset.taskId;
      if (_state !== 'idle' && cardId === _taskId) {
        card.classList.add('focused');
      } else {
        card.classList.remove('focused');
      }
      // 更新锁定状态（不可拖拽）
      card.classList.toggle('locked', _state !== 'idle' && cardId === _taskId);
    });
  }

  /** 启用计时面板任务列表 */
  function _enableTimerTaskList() {
    document.querySelectorAll('.timer-task-item').forEach(el => {
      el.classList.remove('disabled');
    });
  }

  /** 禁用计时面板任务列表 */
  function _disableTimerTaskList() {
    document.querySelectorAll('.timer-task-item').forEach(el => {
      el.classList.add('disabled');
    });
  }

  /**
   * 设置选中的任务（在 idle 状态下）
   * @returns {boolean} 是否设置成功
   */
  function selectTask(taskId) {
    if (_state !== 'idle') return false;
    const task = Store.getById(taskId);
    if (!task || task.column === 'completed') return false;
    _taskId = taskId;
    updateUI();
    return true;
  }

  /** 清除选中的任务引用（外部删除任务后调用） */
  function clearSelectedTask() {
    if (_state !== 'idle') return;
    _taskId = null;
    updateUI();
  }

  return {
    getState, getSeconds, getTaskId, isTaskLocked, isActive,
    start, togglePause, abandon, selectTask, clearSelectedTask, updateUI
  };
})();

// ============================================================
// 渲染计时面板任务列表
// ============================================================
function renderTimerTaskList() {
  const listEl = document.getElementById('timerTaskList');
  const noTasksEl = document.getElementById('timerNoTasks');
  const tasks = Store.getActiveTasks();

  if (tasks.length === 0) {
    listEl.innerHTML = '';
    noTasksEl.style.display = '';
    return;
  }

  noTasksEl.style.display = 'none';
  const currentTaskId = Timer.getTaskId();

  listEl.innerHTML = tasks.map(t => {
    const isSelected = t.id === currentTaskId;
    const isDisabled = Timer.isActive();
    return `
      <div class="timer-task-item${isSelected ? ' selected' : ''}${isDisabled ? ' disabled' : ''}"
           data-task-id="${t.id}">
        <span class="task-item-color" style="background:${t.color};"></span>
        <span class="task-item-title" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</span>
        <span class="task-item-check">✓</span>
      </div>
    `;
  }).join('');

  // 绑定点击事件
  listEl.querySelectorAll('.timer-task-item').forEach(item => {
    item.addEventListener('click', () => {
      if (Timer.isActive()) return;
      Timer.selectTask(item.dataset.taskId);
    });
  });
}

// ============================================================
// HTML 转义工具
// ============================================================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// 看板模块 (Kanban)
// 负责看板渲染、拖拽逻辑（桌面 + 触控）
// ============================================================
const Kanban = (() => {
  // 触控拖拽状态
  let _touchDragTaskId = null;
  let _touchStartX = 0;
  let _touchStartY = 0;
  let _longPressTimer = null;
  let _isDragging = false;
  let _touchMoved = false;
  let _startElement = null;
  let _justDragged = false; // 防止拖拽结束后触发 click 事件
  let _quadrantMode = false; // 四象限视图开关

  /** 渲染全部列 */
  function renderAll() {
    if (_quadrantMode) {
      renderQuadrantView();
    } else {
      renderColumn('todo');
    }
    renderColumn('doing');
    renderColumn('completed');
    updateAllCounts();
  }

  /** 渲染单列 */
  function renderColumn(colKey) {
    const cardsEl = document.getElementById('cards' + capitalize(colKey));
    if (!cardsEl) return;
    const tasks = Store.getByColumn(colKey);

    // 空列占位
    if (tasks.length === 0) {
      cardsEl.innerHTML = `<div class="column-empty">拖放任务至此</div>`;
    } else {
      cardsEl.innerHTML = tasks.map(t => createCardHTML(t)).join('');
    }

    // 绑定卡片事件
    cardsEl.querySelectorAll('.task-card').forEach(card => {
      const taskId = card.dataset.taskId;
      const task = Store.getById(taskId);
      if (!task) return;

      // 更新锁定 / 聚焦状态
      const isLocked = Timer.isTaskLocked(taskId);
      card.classList.toggle('focused', Timer.getState() !== 'idle' && taskId === Timer.getTaskId());
      card.classList.toggle('locked', isLocked);

      // 桌面拖拽事件（锁定的任务不可拖拽）
      if (!isLocked) {
        card.draggable = true;
        card.addEventListener('dragstart', (e) => onDragStart(e, taskId));
        card.addEventListener('dragend', onDragEnd);
      } else {
        card.draggable = false;
      }

      // 触控事件（长按拖拽）
      card.addEventListener('touchstart', (e) => onTouchStart(e, taskId, card));

      // 点击卡片 → 打开编辑（拖拽结束后或被锁定的任务不处理）
      card.addEventListener('click', (e) => {
        if (_justDragged) return;
        if (Timer.isTaskLocked(taskId)) return;
        Modal.openEdit(taskId);
      });

      // 桌面端拖入卡片时的位置指示
      card.addEventListener('dragover', (e) => onCardDragOver(e, card, taskId));
      card.addEventListener('dragleave', (e) => onCardDragLeave(e, card));
      card.addEventListener('drop', (e) => onCardDrop(e, card, taskId));
    });

    updateColumnCount(colKey);
  }

  /** 生成单张卡片的 HTML */
  function createCardHTML(task) {
    const descHtml = task.description
      ? `<div class="card-desc" title="${escapeHtml(task.description)}">${escapeHtml(task.description)}</div>`
      : '';
    return `
      <div class="task-card" data-task-id="${task.id}" data-column="${task.column}">
        <div class="color-strip" style="background:${task.color};"></div>
        <div class="card-content">
          <div class="card-title" title="${escapeHtml(task.title)}">${escapeHtml(task.title)}</div>
          ${descHtml}
        </div>
        <div class="focus-badge">🍅 聚焦中</div>
      </div>
    `;
  }

  /** 辅助：首字母大写 */
  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  // ---- 桌面端 HTML5 拖拽 ----

  function onDragStart(e, taskId) {
    const task = Store.getById(taskId);
    if (!task || Timer.isTaskLocked(taskId)) {
      e.preventDefault();
      return;
    }
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', taskId);
    const card = e.target.closest('.task-card');
    if (card) {
      // 延迟添加样式，确保拖拽图像正确
      setTimeout(() => card.classList.add('dragging'), 0);
    }
  }

  function onDragEnd(e) {
    const card = e.target.closest('.task-card');
    if (card) card.classList.remove('dragging');
    // 清除所有列和卡片的高亮
    document.querySelectorAll('.kanban-column').forEach(col => col.classList.remove('drag-over'));
    document.querySelectorAll('.task-card').forEach(c => {
      c.classList.remove('drop-before', 'drop-after');
    });
    document.querySelectorAll('.quadrant-section').forEach(qs => qs.classList.remove('drag-over'));
  }

  function onCardDragOver(e, card, taskId) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    // 判断鼠标在卡片上半部分还是下半部分
    const rect = card.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    card.classList.remove('drop-before', 'drop-after');
    if (e.clientY < midY) {
      card.classList.add('drop-before');
    } else {
      card.classList.add('drop-after');
    }
  }

  function onCardDragLeave(_e, card) {
    card.classList.remove('drop-before', 'drop-after');
  }

  function onCardDrop(e, card, targetTaskId) {
    e.preventDefault();
    card.classList.remove('drop-before', 'drop-after');
    const taskId = e.dataTransfer.getData('text/plain');
    if (!taskId) return;
    const task = Store.getById(taskId);
    if (!task || Timer.isTaskLocked(taskId)) return;

    // Check if dropping within a quadrant section (inter-quadrant move)
    const targetQuadrant = card.closest('.quadrant-section')?.dataset.quadrant;
    if (targetQuadrant && task.column === 'todo') {
      Store.update(taskId, { quadrant: targetQuadrant, color: getQuadrantColor(targetQuadrant) });
      renderAll();
      return;
    }

    const targetCol = card.closest('.kanban-column')?.dataset.column;
    if (!targetCol) return;

    // 计算插入位置
    const targetTasks = Store.getByColumn(targetCol);
    let targetIndex = targetTasks.findIndex(t => t.id === targetTaskId);
    if (targetIndex === -1) targetIndex = targetTasks.length;

    const rect = card.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    if (e.clientY >= midY) targetIndex++;

    // 如果目标位置在原任务之后且同列，需要调整
    if (task.column === targetCol) {
      const oldIndex = targetTasks.findIndex(t => t.id === taskId);
      if (oldIndex < targetIndex) targetIndex--;
    }

    Store.move(taskId, targetCol, Math.max(0, targetIndex));
    renderAll();
  }

  // 列级别的 dragover / drop（用于拖到空列或列边缘）
  function setupColumnDropZones() {
    document.querySelectorAll('.kanban-column').forEach(col => {
      col.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        col.classList.add('drag-over');
      });
      col.addEventListener('dragleave', (e) => {
        // 仅在离开列本身时移除高亮
        if (!col.contains(e.relatedTarget)) {
          col.classList.remove('drag-over');
        }
      });
      col.addEventListener('drop', (e) => {
        e.preventDefault();
        col.classList.remove('drag-over');
        const taskId = e.dataTransfer.getData('text/plain');
        if (!taskId) return;
        const task = Store.getById(taskId);
        if (!task || Timer.isTaskLocked(taskId)) return;

        const targetCol = col.dataset.column;
        // 添加到目标列末尾
        const targetTasks = Store.getByColumn(targetCol);
        Store.move(taskId, targetCol, targetTasks.length);
        renderAll();
      });
    });
  }

  // ---- 触控拖拽（移动端）----

  function onTouchStart(e, taskId, card) {
    if (Timer.isTaskLocked(taskId)) return;
    _touchStartX = e.touches[0].clientX;
    _touchStartY = e.touches[0].clientY;
    _touchMoved = false;
    _isDragging = false;
    _startElement = card;
    _touchDragTaskId = taskId;

    clearTimeout(_longPressTimer);
    _longPressTimer = setTimeout(() => {
      if (!_touchMoved) {
        beginTouchDrag(e, taskId, card);
      }
    }, LONG_PRESS_MS);
  }

  function onTouchMove(e) {
    if (!_touchDragTaskId) return;
    const dx = e.touches[0].clientX - _touchStartX;
    const dy = e.touches[0].clientY - _touchStartY;
    if (!_isDragging && (Math.abs(dx) > TOUCH_MOVE_THRESHOLD || Math.abs(dy) > TOUCH_MOVE_THRESHOLD)) {
      _touchMoved = true;
      clearTimeout(_longPressTimer);
    }
    if (_isDragging) {
      e.preventDefault();
      updateTouchDrag(e);
    }
  }

  function onTouchEnd(e) {
    clearTimeout(_longPressTimer);
    if (_isDragging) {
      endTouchDrag(e);
      // 防止拖拽结束后浏览器触发 click 事件
      _justDragged = true;
      setTimeout(() => { _justDragged = false; }, 100);
    }
    _touchDragTaskId = null;
    _isDragging = false;
    _touchMoved = false;
    _startElement = null;
  }

  /** 开始触控拖拽 */
  function beginTouchDrag(e, taskId, card) {
    _isDragging = true;
    card.classList.add('dragging');

    // 显示拖拽克隆元素
    const clone = document.getElementById('dragClone');
    const task = Store.getById(taskId);
    if (clone && task) {
      document.getElementById('dragCloneColor').style.background = task.color;
      document.getElementById('dragCloneTitle').textContent = task.title;
      clone.style.display = '';
      updateClonePosition(e.touches[0]);
    }

    // 如果设备支持触觉反馈
    if (navigator.vibrate) {
      navigator.vibrate(15);
    }
  }

  /** 更新拖拽克隆位置 */
  function updateTouchDrag(e) {
    updateClonePosition(e.touches[0]);
    // 高亮手指下方的列
    highlightColumnUnderPoint(e.touches[0].clientX, e.touches[0].clientY);
    // Also highlight quadrant sections
    highlightQuadrantUnderPoint(e.touches[0].clientX, e.touches[0].clientY);
  }

  /** 更新克隆元素位置 */
  function updateClonePosition(touch) {
    const clone = document.getElementById('dragClone');
    if (!clone) return;
    clone.style.left = (touch.clientX - 130) + 'px';
    clone.style.top = (touch.clientY - 40) + 'px';
  }

  /** 高亮手指下方的列 */
  function highlightColumnUnderPoint(clientX, clientY) {
    // 清除所有高亮
    document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
    const el = document.elementFromPoint(clientX, clientY);
    if (el) {
      const col = el.closest('.kanban-column');
      if (col) col.classList.add('drag-over');
    }
  }

  /** 高亮手指下方的象限区域 */
  function highlightQuadrantUnderPoint(clientX, clientY) {
    document.querySelectorAll('.quadrant-section').forEach(qs => qs.classList.remove('drag-over'));
    const el = document.elementFromPoint(clientX, clientY);
    if (el) {
      const qs = el.closest('.quadrant-section');
      if (qs) qs.classList.add('drag-over');
    }
  }

  /** 结束触控拖拽 */
  function endTouchDrag(e) {
    const clone = document.getElementById('dragClone');
    if (clone) clone.style.display = 'none';

    // 清除高亮和指示线
    document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
    document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drop-before', 'drop-after'));
    document.querySelectorAll('.quadrant-section').forEach(qs => qs.classList.remove('drag-over'));

    if (_startElement) {
      _startElement.classList.remove('dragging');
    }

    const taskId = _touchDragTaskId;
    if (!taskId) return;
    const task = Store.getById(taskId);
    if (!task) return;

    // 获取手指所在的列
    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);

    // Check if dropping on a quadrant section (inter-quadrant move)
    const quadrantEl = el?.closest('.quadrant-section');
    if (quadrantEl && task.column === 'todo') {
      const quadrantKey = quadrantEl.dataset.quadrant;
      if (quadrantKey) {
        Store.update(taskId, { quadrant: quadrantKey, color: getQuadrantColor(quadrantKey) });
        renderAll();
        return;
      }
    }

    const targetColEl = el?.closest('.kanban-column');
    if (!targetColEl) return;
    const targetCol = targetColEl.dataset.column;
    if (!targetCol) return;

    // 计算在目标列中的插入位置，同时添加插入位置指示
    const targetTasks = Store.getByColumn(targetCol);
    const cardsInTarget = targetColEl.querySelectorAll('.task-card:not(.dragging)');
    let insertIndex = targetTasks.length;

    for (let i = 0; i < cardsInTarget.length; i++) {
      const rect = cardsInTarget[i].getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      if (touch.clientY < midY) {
        insertIndex = i;
        cardsInTarget[i].classList.add('drop-before');
        break;
      } else {
        cardsInTarget[i].classList.add('drop-after');
      }
    }

    // 调整索引（同列移动时）
    if (task.column === targetCol) {
      const oldIndex = targetTasks.findIndex(t => t.id === taskId);
      if (oldIndex < insertIndex) insertIndex--;
    }

    Store.move(taskId, targetCol, Math.max(0, insertIndex));
    renderAll();
    _isDragging = false;
  }

  // ---- 统计更新 ----

  /** 更新所有列的计数 */
  function updateAllCounts() {
    COLUMNS.forEach(col => updateColumnCount(col.key));
  }

  /** 更新单列计数 */
  function updateColumnCount(colKey) {
    const tasks = Store.getByColumn(colKey);
    const cap = capitalize(colKey);
    const countEl = document.getElementById('count' + cap);
    const tabCountEl = document.getElementById('tabCount' + cap);
    if (countEl) countEl.textContent = tasks.length;
    if (tabCountEl) tabCountEl.textContent = tasks.length;
  }

  /** 注册文档级触控监听（touchmove / touchend 需在 document 上以保证跨越卡片边界的拖拽可靠） */
  function setupDocumentTouch() {
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd);
  }

  /** 切换四象限视图 */
  function toggleQuadrantView() {
    _quadrantMode = !_quadrantMode;
    const colEl = document.getElementById('column-todo');
    const toggleBtn = document.getElementById('quadrantToggleBtn');

    if (_quadrantMode) {
      colEl.classList.add('quadrant-mode');
      toggleBtn.classList.add('quadrant-active');
      renderQuadrantView();
    } else {
      colEl.classList.remove('quadrant-mode');
      toggleBtn.classList.remove('quadrant-active');
      renderColumn('todo');
      updateColumnCount('todo');
    }
  }

  /** 判断是否处于四象限模式 */
  function isQuadrantMode() { return _quadrantMode; }

  /** 渲染四象限视图 */
  function renderQuadrantView() {
    const cardsEl = document.getElementById('cardsTodo');
    const tasks = Store.getByColumn('todo');

    const quadrants = {
      q1: { label: '重要且紧急', cls: 'qs-q1', tasks: [] },
      q2: { label: '重要不紧急', cls: 'qs-q2', tasks: [] },
      q3: { label: '不重要但紧急', cls: 'qs-q3', tasks: [] },
      q4: { label: '不重要不紧急', cls: 'qs-q4', tasks: [] }
    };

    // 分配任务到象限，未分类的放入 q1 作为默认
    tasks.forEach(t => {
      const q = t.quadrant && quadrants[t.quadrant] ? t.quadrant : 'q1';
      quadrants[q].tasks.push(t);
    });

    let html = '<div class="quadrant-grid">';
    for (const [key, q] of Object.entries(quadrants)) {
      html += `<div class="quadrant-section ${q.cls}" data-quadrant="${key}">`;
      html += `<div class="quadrant-section-header">${q.label} (${q.tasks.length})</div>`;
      html += '<div class="quadrant-section-cards">';
      if (q.tasks.length === 0) {
        html += '<div class="quadrant-section-empty">拖放任务至此</div>';
      } else {
        q.tasks.forEach(t => {
          const descHtml = t.description
            ? `<div class="card-desc" title="${escapeHtml(t.description)}">${escapeHtml(t.description)}</div>`
            : '';
          html += `
            <div class="task-card" data-task-id="${t.id}" data-column="${t.column}" data-quadrant="${t.quadrant || ''}">
              <div class="color-strip" style="background:${t.color};"></div>
              <div class="card-content">
                <div class="card-title" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</div>
                ${descHtml}
              </div>
              <div class="focus-badge">🍅 聚焦中</div>
            </div>`;
        });
      }
      html += '</div></div>';
    }
    html += '</div>';

    cardsEl.innerHTML = html;

    // Bind events to quadrant cards
    bindQuadrantCardEvents();
    setupQuadrantDropZones();
    updateColumnCount('todo');
  }

  /** 为四象限视图卡片绑定事件 */
  function bindQuadrantCardEvents() {
    const cardsEl = document.getElementById('cardsTodo');
    cardsEl.querySelectorAll('.task-card').forEach(card => {
      const taskId = card.dataset.taskId;
      const task = Store.getById(taskId);
      if (!task) return;

      const isLocked = Timer.isTaskLocked(taskId);
      card.classList.toggle('focused', Timer.getState() !== 'idle' && taskId === Timer.getTaskId());
      card.classList.toggle('locked', isLocked);

      if (!isLocked) {
        card.draggable = true;
        card.addEventListener('dragstart', (e) => onDragStart(e, taskId));
        card.addEventListener('dragend', onDragEnd);
      } else {
        card.draggable = false;
      }

      // 触控事件（长按拖拽）
      card.addEventListener('touchstart', (e) => onTouchStart(e, taskId, card));

      // 点击卡片 → 打开编辑
      card.addEventListener('click', (e) => {
        if (_justDragged) return;
        if (Timer.isTaskLocked(taskId)) return;
        Modal.openEdit(taskId);
      });

      // 桌面端拖入卡片时的位置指示
      card.addEventListener('dragover', (e) => onCardDragOver(e, card, taskId));
      card.addEventListener('dragleave', (e) => onCardDragLeave(e, card));
      card.addEventListener('drop', (e) => onCardDrop(e, card, taskId));
    });
  }

  /** 为四象限区域绑定拖放事件（用于拖到空象限） */
  function setupQuadrantDropZones() {
    document.querySelectorAll('.quadrant-section').forEach(section => {
      section.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        section.classList.add('drag-over');
      });
      section.addEventListener('dragleave', (e) => {
        if (!section.contains(e.relatedTarget)) {
          section.classList.remove('drag-over');
        }
      });
      section.addEventListener('drop', (e) => {
        e.preventDefault();
        section.classList.remove('drag-over');
        const taskId = e.dataTransfer.getData('text/plain');
        if (!taskId) return;
        const task = Store.getById(taskId);
        if (!task || Timer.isTaskLocked(taskId)) return;
        const targetQuadrant = section.dataset.quadrant;
        if (targetQuadrant && task.column === 'todo') {
          Store.update(taskId, { quadrant: targetQuadrant, color: getQuadrantColor(targetQuadrant) });
          renderAll();
        }
      });
    });
  }

  return { renderAll, renderColumn, renderQuadrantView, toggleQuadrantView, isQuadrantMode, updateAllCounts, setupColumnDropZones, setupDocumentTouch };
})();

// ============================================================
// 模态框管理 (Modal)
// ============================================================
const Modal = (() => {
  /** 当前编辑的任务 ID（null 表示新建） */
  let _editingTaskId = null;
  let _selectedQuadrant = null;

  /** 初始化四象限选择器 */
  function initQuadrantSelector(taskQuadrant, isTodoColumn) {
    const group = document.getElementById('quadrantGroup');
    const btns = document.querySelectorAll('.quadrant-btn');
    _selectedQuadrant = taskQuadrant || null;

    if (isTodoColumn) {
      group.style.display = '';
      btns.forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.quadrant === _selectedQuadrant);
      });
    } else {
      group.style.display = 'none';
    }
  }

  /** 绑定四象限按钮事件 */
  function setupQuadrantEvents() {
    document.querySelectorAll('.quadrant-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.quadrant-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        _selectedQuadrant = btn.dataset.quadrant;
      });
    });
  }

  /** 更新状态切换控件 UI */
  function updateStatusSwitcher(column, isLocked) {
    const buttons = document.querySelectorAll('#statusSwitcher .status-switch-btn');
    buttons.forEach(btn => {
      const isActive = btn.dataset.column === column;
      btn.classList.toggle('active', isActive);
      btn.disabled = isLocked;
    });
  }

  /** 切换任务状态 */
  function switchColumn(newColumn) {
    const currentColumn = document.getElementById('taskFormColumn').value;
    if (currentColumn === newColumn) return;

    // 更新隐藏字段
    document.getElementById('taskFormColumn').value = newColumn;

    if (_editingTaskId) {
      // 编辑模式：即时保存状态变更（插入到目标列末尾）
      const targetTasks = Store.getByColumn(newColumn);
      Store.move(_editingTaskId, newColumn, targetTasks.length);
      Kanban.renderAll();
    }
    // 新建模式：仅更新隐藏字段，保存时使用最终值

    // 更新分段控件 UI
    const isLocked = _editingTaskId ? Timer.isTaskLocked(_editingTaskId) : false;
    updateStatusSwitcher(newColumn, isLocked);

    // 根据新状态控制四象限选择器显隐
    initQuadrantSelector(_selectedQuadrant, newColumn === 'todo');
  }

  /** 打开新建任务模态框 */
  function openCreate(columnKey) {
    _editingTaskId = null;
    _selectedQuadrant = null;
    document.getElementById('taskModalTitle').textContent = '添加任务';
    document.getElementById('taskFormId').value = '';
    document.getElementById('taskFormColumn').value = columnKey;
    document.getElementById('taskFormTitle').value = '';
    document.getElementById('taskFormDesc').value = '';
    document.getElementById('deleteTaskBtn').style.display = 'none';
    updateStatusSwitcher(columnKey, false);
    initQuadrantSelector(null, columnKey === 'todo');
    document.getElementById('taskModalBackdrop').classList.add('open');
    document.getElementById('taskFormTitle').focus();
  }

  /** 打开编辑任务模态框 */
  function openEdit(taskId) {
    const task = Store.getById(taskId);
    if (!task) return;
    _editingTaskId = taskId;
    document.getElementById('taskModalTitle').textContent = '编辑任务';
    document.getElementById('taskFormId').value = task.id;
    document.getElementById('taskFormColumn').value = task.column;
    document.getElementById('taskFormTitle').value = task.title;
    document.getElementById('taskFormDesc').value = task.description || '';

    // 删除按钮始终可见（若任务正被番茄钟锁定，确认时 executeDelete 会自动放弃会话）
    document.getElementById('deleteTaskBtn').style.display = '';

    const isLocked = Timer.isTaskLocked(taskId);
    updateStatusSwitcher(task.column, isLocked);
    initQuadrantSelector(task.quadrant, task.column === 'todo');
    document.getElementById('taskModalBackdrop').classList.add('open');
  }

  /** 关闭任务模态框 */
  function closeTask() {
    document.getElementById('taskModalBackdrop').classList.remove('open');
    _editingTaskId = null;
  }

  /** 保存任务（新建或编辑） */
  function save() {
    const title = document.getElementById('taskFormTitle').value.trim();
    if (!title) {
      document.getElementById('taskFormTitle').focus();
      return;
    }

    const columnKey = document.getElementById('taskFormColumn').value;
    const desc = document.getElementById('taskFormDesc').value.trim();

    if (_editingTaskId) {
      // 编辑现有任务
      Store.update(_editingTaskId, {
        title: title,
        description: desc,
        color: getQuadrantColor(_selectedQuadrant),
        quadrant: _selectedQuadrant
      });
    } else {
      // 新建任务
      Store.add({
        id: crypto.randomUUID(),
        title: title,
        description: desc,
        color: getQuadrantColor(_selectedQuadrant),
        column: columnKey,
        order: 0,
        createdAt: new Date().toISOString(),
        quadrant: _selectedQuadrant
      });
    }

    closeTask();
    Kanban.renderAll();
    renderTimerTaskList();
  }

  /** 确认删除：弹出二次确认 */
  function confirmDelete() {
    const taskId = document.getElementById('taskFormId').value;
    if (!taskId) return;

    const task = Store.getById(taskId);
    if (!task) return;

    const msgEl = document.getElementById('deleteModalMsg');
    if (Timer.isTaskLocked(taskId)) {
      msgEl.textContent = '此任务正在进行番茄专注。放弃番茄会话后，任务将被删除。确定继续吗？';
    } else {
      msgEl.textContent = '确定要删除此任务吗？此操作不可撤销。';
    }

    // 暂存任务 ID
    document.getElementById('deleteModalBackdrop').dataset.taskId = taskId;
    document.getElementById('deleteModalBackdrop').classList.add('open');
  }

  /** 执行删除 */
  function executeDelete() {
    const backdrop = document.getElementById('deleteModalBackdrop');
    const taskId = backdrop.dataset.taskId;
    if (!taskId) return;

    // 如果正在番茄中，先放弃
    if (Timer.isTaskLocked(taskId)) {
      Timer.abandon();
    }

    Store.remove(taskId);
    // 如果删除的任务是计时器选中的任务，清除引用
    if (Timer.getTaskId() === taskId) {
      Timer.clearSelectedTask();
    }
    backdrop.classList.remove('open');
    backdrop.dataset.taskId = '';
    closeTask();
    Kanban.renderAll();
    renderTimerTaskList();
  }

  /** 关闭删除确认模态框 */
  function closeDelete() {
    const backdrop = document.getElementById('deleteModalBackdrop');
    backdrop.classList.remove('open');
    backdrop.dataset.taskId = '';
  }

  /** 绑定状态切换按钮事件（页面初始化时调用一次） */
  function setupStatusSwitcherEvents() {
    document.querySelectorAll('#statusSwitcher .status-switch-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        switchColumn(btn.dataset.column);
      });
    });
  }

  return { setupQuadrantEvents, setupStatusSwitcherEvents, openCreate, openEdit, closeTask, save, confirmDelete, executeDelete, closeDelete, switchColumn, updateStatusSwitcher };
})();

// ============================================================
// 计时器面板开关
// ============================================================

function openTimerPanel() {
  document.getElementById('timerPanel').classList.add('open');
  document.getElementById('timerBackdrop').classList.add('open');
  document.querySelector('.app-container').classList.add('timer-open');
  renderTimerTaskList();
}

function closeTimerPanel() {
  document.getElementById('timerPanel').classList.remove('open');
  document.getElementById('timerBackdrop').classList.remove('open');
  document.querySelector('.app-container').classList.remove('timer-open');
}

function toggleTimerPanel() {
  const panel = document.getElementById('timerPanel');
  if (panel.classList.contains('open')) {
    closeTimerPanel();
  } else {
    openTimerPanel();
  }
}

// ============================================================
// 移动端列标签切换
// ============================================================

function switchMobileColumn(colKey) {
  // 更新标签按钮状态
  document.querySelectorAll('.column-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.column === colKey);
  });
  // 显示 / 隐藏对应的列
  document.querySelectorAll('.kanban-column').forEach(col => {
    col.classList.toggle('active', col.dataset.column === colKey);
  });
}

// ============================================================
// 登录 / 登出回调
// ============================================================

/** 登录成功后：检查数据迁移 → 切换到服务器模式 */
async function onLoginSuccess() {
  // 检查 localStorage 中是否有旧数据
  const raw = localStorage.getItem(STORAGE_KEY);
  const localTasks = raw ? JSON.parse(raw) : [];
  if (localTasks.length > 0) {
    // 弹出迁移对话框（Task 9 实现）
    if (typeof MigrationUI !== 'undefined') {
      MigrationUI.show(localTasks);
    } else {
      // 无 MigrationUI 时直接导入
      try {
        await ApiClient.post('/api/tasks/import', { tasks: localTasks });
        localStorage.removeItem(STORAGE_KEY);
      } catch (_e) { /* 静默失败 */ }
      await Store.loadFromServer();
      Kanban.renderAll();
      if (typeof renderTimerTaskList === 'function') renderTimerTaskList();
    }
  } else {
    await Store.loadFromServer();
    Kanban.renderAll();
    if (typeof renderTimerTaskList === 'function') renderTimerTaskList();
  }
  Sync.connect();
}

/** 登出后：切回 localStorage 模式 */
async function onLogout() {
  Sync.disconnect();
  Store.init();
  Kanban.renderAll();
  if (typeof renderTimerTaskList === 'function') renderTimerTaskList();
}

// ============================================================
// 应用初始化 (App)
// ============================================================
(async function initApp() {
  // 0. 初始化主题
  const savedTheme = localStorage.getItem('pomodoro-kanban-theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);

  // 1. 初始化 UI 事件
  AuthUI.setupEvents();
  MigrationUI.setupEvents();
  Modal.setupQuadrantEvents();
  Modal.setupStatusSwitcherEvents();

  // 2. 尝试从 token 恢复登录状态
  const isLoggedIn = await AuthUI.init();

  if (isLoggedIn) {
    // 已登录：从服务器加载任务
    await Store.loadFromServer();
    Sync.connect();
  } else {
    // 未登录：从 localStorage 加载
    Store.init();
  }

  // 3. 清理过期的已完成任务（7 天前）
  Store.purgeExpired();

  // 4. 渲染看板
  Kanban.renderAll();
  Kanban.setupColumnDropZones();
  if (typeof Kanban.setupDocumentTouch === 'function') Kanban.setupDocumentTouch();

  // 5. 渲染计时面板任务列表
  renderTimerTaskList();

  // 6. 更新计时器 UI（确保加载后状态干净）
  Timer.updateUI();

  // ---- 事件绑定 ----

  // 列"添加任务"按钮
  document.querySelectorAll('.column-add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      Modal.openCreate(btn.dataset.column);
    });
  });

  // 任务表单提交
  document.getElementById('taskForm').addEventListener('submit', (e) => {
    e.preventDefault();
    Modal.save();
  });

  // 取消按钮
  document.getElementById('cancelTaskBtn').addEventListener('click', Modal.closeTask);

  // 删除按钮（编辑模态框内）
  document.getElementById('deleteTaskBtn').addEventListener('click', Modal.confirmDelete);

  // 模态框遮罩点击关闭
  document.getElementById('taskModalBackdrop').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) Modal.closeTask();
  });

  // 删除确认模态框
  document.getElementById('confirmDeleteBtn').addEventListener('click', Modal.executeDelete);
  document.getElementById('cancelDeleteBtn').addEventListener('click', Modal.closeDelete);
  document.getElementById('deleteModalBackdrop').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) Modal.closeDelete();
  });

  // Escape 关闭模态框
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (document.getElementById('taskModalBackdrop').classList.contains('open')) {
        Modal.closeTask();
      } else if (document.getElementById('deleteModalBackdrop').classList.contains('open')) {
        Modal.closeDelete();
      } else if (document.getElementById('authModalBackdrop').classList.contains('open')) {
        AuthUI.hide();
      } else if (document.getElementById('timerPanel').classList.contains('open')) {
        closeTimerPanel();
      }
    }
  });

  // 计时器切换按钮
  document.getElementById('timerToggleBtn').addEventListener('click', toggleTimerPanel);

  // 计时器最小化按钮
  document.getElementById('timerMinimizeBtn').addEventListener('click', closeTimerPanel);

  // 计时器遮罩点击关闭
  document.getElementById('timerBackdrop').addEventListener('click', closeTimerPanel);

  // 计时器控制按钮
  document.getElementById('timerStartBtn').addEventListener('click', () => {
    const taskId = Timer.getTaskId();
    if (taskId) Timer.start(taskId);
  });

  document.getElementById('timerPauseBtn').addEventListener('click', () => {
    Timer.togglePause();
  });

  document.getElementById('timerAbandonBtn').addEventListener('click', () => {
    Timer.abandon();
  });

  // 主题切换按钮
  document.getElementById('themeToggleBtn').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('pomodoro-kanban-theme', next);
  });

  // 四象限视图切换按钮
  document.getElementById('quadrantToggleBtn').addEventListener('click', () => {
    Kanban.toggleQuadrantView();
  });

  // 移动端列标签切换
  document.querySelectorAll('.column-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      switchMobileColumn(tab.dataset.column);
    });
  });

  // 跨标签页 localStorage 同步（仅在非服务器模式下生效）
  window.addEventListener('storage', (e) => {
    if (e.key === STORAGE_KEY && !Store.isServerMode()) {
      Store.init();
      Kanban.renderAll();
      if (typeof renderTimerTaskList === 'function') renderTimerTaskList();
    }
  });

  // 页面关闭前立即保存数据
  window.addEventListener('beforeunload', () => {
    Store.flushSave();
  });

  // 定期清理过期任务
  _purgeIntervalId = setInterval(() => Store.purgeExpired(), 60 * 60 * 1000);

})();

</script>
